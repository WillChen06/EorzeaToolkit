name: Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review pull request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Normalize Claude OAuth token
        id: claude-token
        env:
          RAW_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          token="$(printf '%s' "$RAW_TOKEN" | tr -d '\r\n')"
          if [ -z "$token" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN is empty after normalization" >&2
            exit 1
          fi
          echo "::add-mask::$token"
          printf 'token=%s\n' "$token" >> "$GITHUB_OUTPUT"

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ steps.claude-token.outputs.token }}
          github_token: ${{ github.token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for correctness, maintainability, SwiftUI best practices, data handling, localization regressions, and security issues.

            Rules:
            - Do not modify files, create commits, push branches, approve, or merge.
            - Prefer concise, actionable feedback in Traditional Chinese.
            - If you find a concrete issue, leave an inline comment on the most relevant changed line when possible.
            - Always leave a final PR comment with `gh pr comment`, even when no fix is needed.
            - If no fix is needed, say that explicitly and mention any residual test/build risk.
            - Include whether the CI build result was visible to you.
          claude_args: |
            --max-turns 16
            --allowedTools "Read,Grep,Glob,Bash(gh:*),Bash(git diff:*),Bash(git show:*),mcp__github_inline_comment__create_inline_comment"
