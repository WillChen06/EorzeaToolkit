name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        # v6 uses Node 24 and avoids GitHub's Node 20 action deprecation.
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project schemes
        run: xcodebuild -list -project EorzeaToolkit.xcodeproj

      - name: Build
        run: |
          xcodebuild build \
            -project EorzeaToolkit.xcodeproj \
            -scheme EorzeaToolkit \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO
